name: Build, Sign, and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    # Only sign when we have the secrets available (not on PRs from forks)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build extension
        run: bunx vite build

      - name: Package unsigned extension
        run: |
          cd dist
          zip -r ../zeroconnect-wallet-unsigned.xpi .
          cd ..

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-unsigned
          path: zeroconnect-wallet-unsigned.xpi

      - name: Check for Mozilla API secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.AMO_API_KEY }}" ] && [ -n "${{ secrets.AMO_API_SECRET }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️  Mozilla API secrets not found. Skipping signing."
          fi

      - name: Create source code archive
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: |
          zip -r source-code.zip src/ manifest.json package.json biome.json tsconfig.json vite.config.ts justfile README.md LICENSE BUILD_INSTRUCTIONS.md

      - name: Sign with Mozilla
        if: steps.check-secrets.outputs.has_secrets == 'true'
        id: sign
        uses: kewisch/action-web-ext@v1
        continue-on-error: true
        with:
          cmd: sign
          source: ./dist
          channel: unlisted
          apiKey: ${{ secrets.AMO_API_KEY }}
          apiSecret: ${{ secrets.AMO_API_SECRET }}
          uploadSourceCode: ./source-code.zip
          timeout: 3600000  # 1 hour timeout for review

      - name: Upload signed artifact
        if: steps.check-secrets.outputs.has_secrets == 'true' && steps.sign.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: extension-signed
          path: web-ext-artifacts/*.xpi

  release:
    needs: build-and-sign
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-unsigned
          path: ./artifacts

      - name: Download signed artifact (if available)
        uses: actions/download-artifact@v4
        with:
          name: extension-signed
          path: ./artifacts
        continue-on-error: true

      - name: Prepare release files
        run: |
          cd artifacts
          # Rename unsigned file
          mv zeroconnect-wallet-unsigned.xpi zeroconnect-wallet-v${GITHUB_REF_NAME#v}-unsigned.xpi 2>/dev/null || true
          # Rename signed file if it exists
          for f in *.xpi; do
            if [[ "$f" != *"unsigned"* ]] && [[ "$f" == *.xpi ]]; then
              mv "$f" "zeroconnect-wallet-v${GITHUB_REF_NAME#v}.xpi"
              break
            fi
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.xpi
          generate_release_notes: true
          body: |
            ## Installation
            
            ### Signed Version (Recommended)
            Download `zeroconnect-wallet-v${{ github.ref_name }}.xpi` - This is signed by Mozilla and works in standard Firefox.
            
            ### Unsigned Version (For testing only)
            Download `zeroconnect-wallet-v${{ github.ref_name }}-unsigned.xpi` - This requires Firefox Developer Edition with `xpinstall.signatures.required` set to `false`.
            
            ## What's New
            See [CHANGELOG.md](./CHANGELOG.md) or git log for details.
            
            ## Development
            See README.md for development instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
