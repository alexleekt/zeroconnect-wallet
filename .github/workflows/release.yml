name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build extension
        run: bunx vite build

      - name: Package extension
        run: |
          cd dist
          zip -r ../zeroconnect-wallet.xpi .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-xpi
          path: zeroconnect-wallet.xpi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build extension
        run: bunx vite build

      - name: Package extension
        run: |
          cd dist
          zip -r ../zeroconnect-wallet.xpi .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: zeroconnect-wallet.xpi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
