<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Wallet body -->
  <rect x="10" y="25" width="70" height="50" rx="8" ry="8" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Wallet inner area -->
  <rect x="15" y="30" width="60" height="40" rx="5" ry="5" fill="#1a1a1a"/>
  
  <!-- The "ro" in the center -->
  <text x="42" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">ro</text>
  
  <!-- Wallet flap/tab on the right -->
  <path d="M 75 35 L 90 35 A 5 5 0 0 1 95 40 L 95 60 A 5 5 0 0 1 90 65 L 75 65 A 10 10 0 0 1 75 35" fill="#1a1a1a" stroke="white" stroke-width="2"/>
  
  <!-- Small circle on the flap -->
  <circle cx="85" cy="50" r="4" fill="white"/>
</svg>
